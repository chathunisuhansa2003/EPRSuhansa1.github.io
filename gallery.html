    <style>

/* ── Top Navigation ─────────────────────────────────────────────── */
.top-nav {
  background: linear-gradient(135deg, #0a3d62 0%, #0d4a7a 100%);
  color: rgb(255, 255, 255);
  padding: 16px 0;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(10px);
}

.top-nav .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 30px;
  max-width: 14000px;
  margin: 0 auto;
  padding: 0 30px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 40px;
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.02);
}

.logo img {
  max-height: 250px;
  width: auto;
  display: block;
}

nav {
  flex: 1;
  display: flex;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  margin: 0;
  padding: 0;
}

nav li {
  position: relative;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  transition: color 0.3s ease;
  padding: 8px 0;
  display: block;
}

nav a:hover {
  color: #34c759;
}

/* Dropdown Styling */
.dropdown {
  position: relative;
}

.dropbtn {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.arrow {
  font-size: 10px;
  transition: transform 0.3s ease;
}

.dropdown:hover .arrow {
  transform: rotate(180deg);
}

.dropdown-content {
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(10, 30, 50, 0.98);
  backdrop-filter: blur(15px);
  border-radius: 10px;
  padding: 12px 0;
  min-width: 200px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: all 0.3s ease;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  margin-top: 8px;
}

.dropdown:hover .dropdown-content {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.dropdown-content a {
  color: white;
  padding: 12px 20px;
  text-decoration: none;
  font-weight: 400;
  font-size: 13px;
  transition: all 0.2s ease;
  display: block;
}

.dropdown-content a:hover {
  background: rgba(52, 199, 89, 0.15);
  color: #34c759;
  padding-left: 24px;
}

.right-menu {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.insights, .careers {
  color: white;
  text-decoration: none;
  font-weight: 500;
  font-size: 13px;
  transition: color 0.3s ease;
}

.insights:hover, .careers:hover {
  color: #34c759;
}

.contact-btn {
  background: linear-gradient(135deg, #34c759 0%, #2ea043 100%);
  color: white;
  padding: 10px 24px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(52, 199, 89, 0.25);
}

.contact-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(52, 199, 89, 0.35);
}

.search {
  font-size: 18px;
  color: white;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease;
  padding: 6px 8px;
  border-radius: 6px;
}

.search:hover {
  color: #34c759;
  background: rgba(52, 199, 89, 0.15);
}

/* Responsive Navigation */
@media (max-width: 1024px) {
  .top-nav .container {
    gap: 20px;
  }
  
  nav ul {
    gap: 20px;
  }
}

@media (max-width: 768px) {
  .top-nav .container {
    flex-direction: column;
    gap: 15px;
    padding: 12px 20px;
  }
  
  nav {
    width: 100%;
  }
  
  nav ul {
    justify-content: center;
    gap: 16px;
  }
  
  .right-menu {
    width: 100%;
    justify-content: center;
  }
  
  .logo img {
    max-height: 40px;
  }
}
 * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            margin-top: 80px;
            background: radial-gradient(circle at top left, rgba(91, 192, 255, 0.55), transparent 24%),
                        radial-gradient(circle at 80% 20%, rgba(255, 208, 125, 0.35), transparent 18%),
                        linear-gradient(135deg, #071b34 0%, #173b6f 45%, #2f6dbf 100%);
            background-attachment: fixed;
            color: #f7f9ff;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 25% 15%, rgba(255,255,255,0.12) 0%, transparent 22%),
                              radial-gradient(circle at 85% 80%, rgba(255,255,255,0.08) 0%, transparent 18%);
            pointer-events: none;
            opacity: 0.9;
            z-index: -1;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #fdfdfd;
            text-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            letter-spacing: 1px;
            font-size: clamp(2.8rem, 4vw, 4.2rem);
            margin-top: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
        }
        
        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 24px 55px rgba(0, 0, 0, 0.32);
        }
        
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.08);
        }
        
        .gallery-item-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(8, 23, 55, 0.92) 85%);
            color: #f8fbff;
            padding: 18px 20px;
            transform: translateY(100%);
            transition: transform 0.28s ease;
            font-size: 1rem;
            letter-spacing: 0.02em;
        }
        
        .gallery-item:hover .gallery-item-caption {
            transform: translateY(0);
        }

    </style>
